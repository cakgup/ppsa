<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A4314" />
  <meta name="description" content="Aplikasi Majmu'ah ad-Du'a Pondok Pesantren Sunan Ampel Jombang - offline, ringan, dan khusyuk." />
  <title>Majmu'ah ad-Du'a Sunan Ampel</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="splash" class="splash" aria-label="Layar pembuka aplikasi">
    <img src="assets/logo.png" alt="Logo Pondok Pesantren Sunan Ampel" class="splash-logo" />
    <div class="splash-title arabic-brand-title" lang="ar" dir="rtl">مَجْمُوعَةُ الدُّعَاءِ</div>
    <div class="splash-subtitle arabic-brand-subtitle" lang="ar" dir="rtl">لِلْمَعْهَدِ الْإِسْلَامِيِّ سُونَانْ أَمْفِيلْ</div>
  </div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="assets/logo.png" alt="Logo PPSA" class="brand-logo" />
        <div>
          <h1 class="arabic-brand-title" lang="ar" dir="rtl">مَجْمُوعَةُ الدُّعَاءِ</h1>
          <p class="arabic-brand-subtitle" lang="ar" dir="rtl">لِلْمَعْهَدِ الْإِسْلَامِيِّ سُونَانْ أَمْفِيلْ</p>
        </div>
      </div>
      <button id="installBtn" class="ghost-btn" hidden>Install</button>
    </header>

    <main id="app" class="content" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Navigasi utama">
      <button class="nav-btn active" data-view="home" aria-label="Beranda">
        <span class="nav-icon">⌂</span><span>Beranda</span>
      </button>
      <button class="nav-btn" data-view="read" aria-label="Baca doa">
        <span class="nav-icon">۞</span><span>Baca</span>
      </button>
      <button class="nav-btn" data-view="tasbih" aria-label="Tasbih digital">
        <span class="nav-icon">●</span><span>Tasbih</span>
      </button>
      <button class="nav-btn" data-view="settings" aria-label="Pengaturan dan info">
        <span class="nav-icon">⚙</span><span>Info</span>
      </button>
    </nav>
  </div>

  <script src="js/app.js" defer></script>
</body>
</html>
